version: '3.8'

services:
  app:
    image: node:20
    working_dir: /app
    volumes:
      - .:/app    # Mounts the current directory directly to /app inside the container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
